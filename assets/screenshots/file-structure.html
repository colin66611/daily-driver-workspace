<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Driver 文件结构</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 40px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #252526;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4ec9b0;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3c3c3c;
            padding-bottom: 10px;
        }
        .tree {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
        }
        .tree-line {
            padding: 2px 0;
        }
        .folder {
            color: #dcb67a;
        }
        .file {
            color: #9cdcfe;
        }
        .indent-1 { margin-left: 0; }
        .indent-2 { margin-left: 20px; }
        .indent-3 { margin-left: 40px; }
        .indent-4 { margin-left: 60px; }
        .indent-5 { margin-left: 80px; }
        .comment {
            color: #6a9955;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Daily Driver 文件结构</h1>
        <div class="tree">
            <div class="tree-line indent-1 folder">📂 知识库/</div>
            <div class="tree-line indent-2 file">📄 CLAUDE.md <span class="comment"># 项目指导</span></div>
            <div class="tree-line indent-2 folder">📂 learning/</div>
            <div class="tree-line indent-2 folder">📂 life/</div>
            <div class="tree-line indent-2 folder">📂 work/</div>
            <div class="tree-line indent-2 folder">📂 others/</div>
            <div class="tree-line indent-3 folder">📂 daily/</div>
            <div class="tree-line indent-4 file">📄 _Idea-Parking-Lot.md <span class="comment"># 想法停车场</span></div>
            <div class="tree-line indent-4 file">📄 _QuickStart-Guide.md <span class="comment"># 快速上手</span></div>
            <div class="tree-line indent-4 folder">📂 2026-03-30/ <span class="comment"># 按日期组织</span></div>
            <div class="tree-line indent-5 file">📄 2026-03-30.md <span class="comment"># 每日总结</span></div>
            <div class="tree-line indent-5 folder">📂 task_M1_任务名/ <span class="comment"># 任务目录</span></div>
            <div class="tree-line indent-4 folder">📂 2026-03-31/</div>
            <div class="tree-line indent-4 folder">📂 ...</div>
        </div>
    </div>
</body>
</html>
